name: Dispatch LinkedIn Post

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: |
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'linkedin')
    runs-on: ubuntu-latest

    steps:
      - name: Extrair Conteúdo Final da issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extrai tudo entre "## Conteúdo Final" e o próximo "---" ou "##"
            const match = body.match(/## Conte[uú]do Final\s*\n(?:<!--.*?-->\s*\n)?(.*?)(?=\n---\n|\n## )/s);
            if (!match) {
              core.setFailed('Seção "## Conteúdo Final" não encontrada na issue.');
              return;
            }

            const content = match[1].trim();
            if (!content) {
              core.setFailed('Conteúdo Final está vazio.');
              return;
            }

            core.setOutput('content', content);
            core.setOutput('issue_number', context.payload.issue.number);
            console.log(`Conteúdo extraído (${content.length} chars):`, content.substring(0, 100) + '...');

      - name: Disparar post no LinkedIn via n8n
        id: post
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg content "$CONTENT" '{content: $content}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Webhook retornou HTTP $HTTP_CODE"
            exit 1
          fi

          SUCCESS=$(echo "$BODY" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::n8n retornou erro: $BODY"
            exit 1
          fi
        env:
          CONTENT: ${{ steps.extract.outputs.content }}

      - name: Finalizar — labels, fechar issue e comentar
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = parseInt('${{ steps.extract.outputs.issue_number }}');
            const { owner, repo } = context.repo;

            // Garantir que label "published" existe
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'published' });
            } catch(e) {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'published',
                color: '0075ca',
                description: 'Post publicado'
              });
            }

            // Adicionar label "published"
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['published'] });

            // Remover label "approved"
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'approved' });
            } catch(e) { /* ignora */ }

            // Fechar issue
            await github.rest.issues.update({ owner, repo, issue_number, state: 'closed', state_reason: 'completed' });

            // Comentar
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: '✅ Post publicado com sucesso no LinkedIn!'
            });

      - name: Comentar erro na issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = parseInt('${{ steps.extract.outputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: '❌ Falha ao publicar no LinkedIn. Verifique os [logs da Action](https://github.com/${{ github.repository }}/actions) para detalhes.'
            });
