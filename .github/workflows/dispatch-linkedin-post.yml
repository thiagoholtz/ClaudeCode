name: Dispatch LinkedIn Post

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: "github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'linkedin')"
    runs-on: ubuntu-latest

    steps:
      - name: Extrair Conteúdo Final da issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const match = body.match(/## Conte[uú]do Final\s*\n(?:<!--.*?-->\s*\n)?(.*?)(?=\n---\n|\n## )/s);
            if (!match) {
              core.setFailed('Seção "## Conteúdo Final" não encontrada na issue.');
              return;
            }

            const content = match[1].trim();
            if (!content) {
              core.setFailed('Conteúdo Final está vazio.');
              return;
            }

            core.setOutput('content', content);
            core.setOutput('issue_number', context.payload.issue.number);
            core.setOutput('issue_title', context.payload.issue.title);
            console.log(`Conteúdo extraído (${content.length} chars):`, content.substring(0, 100) + '...');

      - name: Disparar post no LinkedIn via n8n
        id: post
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg content "$CONTENT" '{content: $content}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Webhook retornou HTTP $HTTP_CODE"
            exit 1
          fi

          SUCCESS=$(echo "$BODY" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::n8n retornou erro: $BODY"
            exit 1
          fi
        env:
          CONTENT: ${{ steps.extract.outputs.content }}

      - name: Finalizar — labels, fechar issue, métricas e comentar
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = parseInt('${{ steps.extract.outputs.issue_number }}');
            const issue_title = '${{ steps.extract.outputs.issue_title }}';
            const { owner, repo } = context.repo;

            // Garantir labels existem
            for (const label of [
              { name: 'published', color: '0075ca', description: 'Post publicado' },
              { name: 'metrics',   color: 'e4e669', description: 'Rastreamento de métricas' }
            ]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch(e) {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            // Atualizar labels da issue original
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['published'] });
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'approved' });
            } catch(e) {}

            // Fechar issue
            await github.rest.issues.update({ owner, repo, issue_number, state: 'closed', state_reason: 'completed' });

            // Calcular data de coleta (hoje + 7 dias)
            const today = new Date();
            const collectDate = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
            const fmt = d => d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });

            // Extrair sprint label
            const labels = context.payload.issue.labels.map(l => l.name);
            const sprintLabel = labels.find(l => l.startsWith('sprint:') || l.startsWith('sprint-')) || 'sprint-01';

            // Criar issue de métricas
            const metricsIssue = await github.rest.issues.create({
              owner, repo,
              title: `Métricas — Post #${issue_number} | ${issue_title}`,
              labels: ['metrics', sprintLabel, 'linkedin'],
              body: `## Métricas — Post #${issue_number} (coletar 7 dias após publicação)

**Post:** #${issue_number} — ${issue_title}
**Publicado em:** ${fmt(today)}
**Coletar em:** ${fmt(collectDate)}

---

## Resultados (preencher após 7 dias)

| Métrica | Resultado |
|---------|-----------|
| Impressões | |
| Reações (curtidas) | |
| Comentários | |
| Compartilhamentos | |
| Cliques no perfil | |
| Novos seguidores | |

## Análise

**Padrão usado:** [gancho-dado-numerico / framework-numerado / provocacao / erro]
**Horário de publicação:** [07h / 12h]
**Engajamento rate:** [calcular: (reações + comentários) / impressões × 100]%

## Aprendizado

- O que funcionou:
- O que mudar no próximo post similar:
- Vale repetir o padrão? [ ] Sim  [ ] Não  [ ] Com ajuste

---

> Fechar esta issue após preencher os dados. Use na retrospectiva com \`/retrospective\`.`
            });

            // Comentar na issue original com link de métricas
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `✅ Post publicado com sucesso no LinkedIn!\n\n📊 Issue de métricas criada: #${metricsIssue.data.number} — preencher em 7 dias (${fmt(collectDate)})`
            });

      - name: Comentar erro na issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = parseInt('${{ steps.extract.outputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: '❌ Falha ao publicar no LinkedIn. Verifique os [logs da Action](https://github.com/${{ github.repository }}/actions) para detalhes.'
            });
